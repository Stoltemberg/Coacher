services:
  - type: web
    name: coacher-neural-platform
    env: node
    plan: free
    rootDir: site
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
    healthCheckPath: /
    autoDeploy: true
