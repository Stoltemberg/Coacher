services:
  - type: web
    name: coacher-neural-platform
    runtime: static
    rootDir: site
    buildCommand: npm install && npm run build
    staticPublishPath: out
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; object-src 'none';"
      - path: /coacher_v1_setup.exe
        name: Content-Type
        value: application/vnd.microsoft.portable-executable
      - path: /coacher_v1_setup.exe
        name: Content-Disposition
        value: attachment; filename="coacher_v1_setup.exe"
    routes:
      - type: rewrite
        source: /([^.]*)
        destination: /index.html
